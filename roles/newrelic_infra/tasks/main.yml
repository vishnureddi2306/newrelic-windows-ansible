- name: Install or Upgrade New Relic Infrastructure Agent
  ansible.windows.win_package:
    path: https://download.newrelic.com/infrastructure_agent/windows/newrelic-infra.msi
    state: present

- name: Ensure New Relic config directory exists
  ansible.windows.win_file:
    path: 'C:\Program Files\New Relic\newrelic-infra'
    state: directory

- name: Configure New Relic license key
  ansible.windows.win_template:
    src: newrelic-infra.yml.j2
    dest: 'C:\Program Files\New Relic\newrelic-infra\newrelic-infra.yml'

- name: Ensure New Relic Infrastructure service is running
  ansible.windows.win_service:
    name: newrelic-infra
    state: started
    start_mode: auto
